<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellations of Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --coi-bg-primary: #070B14;
            --coi-bg-secondary: #0F172A;
            --coi-accent: #2EE9F6;
            --coi-text-primary: #F4F7FF;
            --coi-text-secondary: #A9B3C8;
            --coi-glass-bg: rgba(15, 23, 42, 0.75);
            --coi-glass-border: rgba(46, 233, 246, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--coi-bg-primary);
            color: var(--coi-text-primary);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
            line-height: 1.05;
        }

        .font-mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(46, 233, 246, 0.35);
            border-radius: 22px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px) saturate(115%);
            -webkit-backdrop-filter: blur(14px) saturate(115%);
        }

        /* Glass Button */
        .glass-button {
            background: rgba(46, 233, 246, 0.1);
            border: 1px solid rgba(46, 233, 246, 0.4);
            border-radius: 12px;
            color: var(--coi-accent);
            padding: 14px 28px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .glass-button:hover {
            background: rgba(46, 233, 246, 0.2);
            border-color: rgba(46, 233, 246, 0.7);
            box-shadow: 0 0 25px rgba(46, 233, 246, 0.3);
            transform: translateY(-2px);
        }

        /* HUD Label */
        .hud-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--coi-accent);
        }

        /* Tag Pill */
        .tag-pill {
            background: rgba(46, 233, 246, 0.08);
            border: 1px solid rgba(46, 233, 246, 0.25);
            border-radius: 20px;
            padding: 6px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--coi-text-secondary);
        }

        /* Noise Overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(7, 11, 20, 0.6) 100%);
            pointer-events: none;
        }

        /* Float Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .float-animation {
            animation: float 2.8s ease-in-out infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--coi-bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(46, 233, 246, 0.3);
            border-radius: 3px;
        }

        /* Modal Scrollbar */
        .case-modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .case-modal-content::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }

        .case-modal-content::-webkit-scrollbar-thumb {
            background: rgba(46, 233, 246, 0.4);
            border-radius: 4px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, var(--coi-bg-primary), transparent);
            pointer-events: none;
        }

        .nav > * {
            pointer-events: auto;
        }

        .nav-logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 18px;
            font-weight: bold;
            color: var(--coi-accent);
            letter-spacing: 0.1em;
        }

        .nav-dots {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(46, 233, 246, 0.3);
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: var(--coi-accent);
            width: 16px;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .starfield {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 0 24px;
        }

        .hero-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--coi-accent);
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 700;
            line-height: 0.95;
            margin-bottom: 32px;
            background: linear-gradient(135deg, var(--coi-text-primary) 0%, var(--coi-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: var(--coi-text-secondary);
            line-height: 1.6;
            margin-bottom: 48px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--coi-text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Project Section */
        .project {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px 0;
        }

        .project-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 48px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }

        .project-graph {
            position: relative;
        }

        .project-graph-container {
            aspect-ratio: 4/3;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .project-graph-header {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
        }

        .project-graph-layout {
            position: absolute;
            top: 16px;
            right: 16px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--coi-text-secondary);
            opacity: 0.6;
        }

        .project-graph-svg {
            width: 100%;
            height: 100%;
        }

        .project-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .project-subtitle {
            margin-bottom: 4px;
        }

        .project-title {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .project-description {
            font-size: 16px;
            line-height: 1.7;
            color: var(--coi-text-secondary);
            max-width: 500px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }

        /* Animation Classes */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-in-left {
            opacity: 0;
            transform: translateX(-50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .slide-in-left.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* Case Study Modal */
        .case-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(7, 11, 20, 0.85);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .case-modal.active {
            display: flex;
            opacity: 1;
        }

        .case-modal-content {
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            background: var(--coi-glass-bg);
            border: 1px solid var(--coi-glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .case-modal.active .case-modal-content {
            transform: scale(1) translateY(0);
        }

        .case-modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 32px 32px 0;
            border-bottom: 1px solid rgba(46, 233, 246, 0.15);
        }

        .case-modal-title-section {
            flex: 1;
            padding-bottom: 24px;
        }

        .case-modal-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--coi-accent);
            margin-bottom: 8px;
        }

        .case-modal-title {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            color: var(--coi-text-primary);
        }

        .case-modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(46, 233, 246, 0.1);
            border: 1px solid rgba(46, 233, 246, 0.3);
            color: var(--coi-accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 16px;
        }

        .case-modal-close:hover {
            background: rgba(46, 233, 246, 0.2);
            border-color: rgba(46, 233, 246, 0.6);
            transform: rotate(90deg);
        }

        .case-modal-body {
            padding: 32px;
            overflow-y: auto;
            flex: 1;
        }

        .case-section {
            margin-bottom: 32px;
        }

        .case-section:last-child {
            margin-bottom: 0;
        }

        .case-section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--coi-accent);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(46, 233, 246, 0.2);
        }

        .case-section-content {
            font-size: 15px;
            line-height: 1.8;
            color: var(--coi-text-secondary);
        }

        .case-section-content p {
            margin-bottom: 16px;
        }

        .case-section-content p:last-child {
            margin-bottom: 0;
        }

        .case-metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .case-metric {
            background: rgba(46, 233, 246, 0.05);
            border: 1px solid rgba(46, 233, 246, 0.2);
            border-radius: 12px;
            padding: 16px;
        }

        .case-metric-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            color: var(--coi-accent);
            margin-bottom: 4px;
        }

        .case-metric-label {
            font-size: 12px;
            color: var(--coi-text-secondary);
        }

        .case-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .project-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .project-graph {
                order: -1;
            }

            .project-container {
                padding: 0 24px;
            }

            .nav {
                padding: 16px 24px;
            }

            .case-modal {
                padding: 16px;
            }

            .case-modal-content {
                max-height: 95vh;
            }

            .case-modal-header {
                padding: 24px 24px 0;
            }

            .case-modal-body {
                padding: 24px;
            }

            .case-modal-title {
                font-size: 22px;
            }

            .case-metrics-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 36px;
            }

            .project-title {
                font-size: 24px;
            }

            .case-modal-header {
                padding: 20px 20px 0;
            }

            .case-modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-logo">COI</div>
        <div class="nav-dots">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>

            <div class="nav-dot"></div>

            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <canvas class="starfield" id="starfield"></canvas>
        <div class="vignette"></div>
        <div class="hero-content">
            <div class="hero-label">Data Science Portfolio</div>
            <h1 class="hero-title">Constellations<br>of Intelligence</h1>
            <p class="hero-subtitle">Twenty end-to-end machine learning systems—architected, trained, and deployed at production scale.</p>
            <button class="glass-button hero-cta" onclick="scrollToProjects()">
                Explore Projects
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 17L17 7"></path>
                    <path d="M7 7h10v10"></path>
                </svg>
            </button>
        </div>
        <div class="scroll-indicator">
            <span>Scroll</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M19 12l-7 7-7-7"></path>
            </svg>
        </div>
    </section>

    <!-- Projects Container -->
    <div id="projects-container"></div>

    <!-- Case Study Modal -->
    <div class="case-modal" id="caseModal">
        <div class="case-modal-content">
            <div class="case-modal-header">
                <div class="case-modal-title-section">
                    <div class="case-modal-subtitle" id="modalSubtitle"></div>
                    <h2 class="case-modal-title" id="modalTitle"></h2>
                </div>
                <button class="case-modal-close" onclick="closeCaseModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="case-modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Case Studies Data
        const caseStudies = {
            1: {
                subtitle: 'Machine Learning',
                title: 'Credit Risk Scoring Engine',
                executiveSummary: `This project delivered a production-grade credit risk assessment platform for a regional banking consortium serving 2.3 million retail customers. The legacy system relied on rudimentary scorecards with limited predictive power, resulting in suboptimal lending decisions and elevated default rates.

The solution implements a sophisticated machine learning pipeline that combines traditional credit scoring methodologies with modern interpretability techniques. By leveraging Weight of Evidence (WOE) binning and Information Value (IV) analysis, we transformed raw credit bureau data into predictive features while maintaining full regulatory transparency. The final ensemble model achieves superior discrimination power while providing clear explanations for every lending decision.`,
                businessProblem: `The banking consortium faced mounting pressure from regulators to improve credit risk assessment accuracy while maintaining explainability. Default rates had increased 23% over three years, eroding portfolio profitability. The existing scorecard system, built in 2012, failed to capture complex non-linear relationships in customer behavior data.

Key challenges included: regulatory compliance requiring explainable decisions, integration with legacy core banking systems, handling missing data for thin-file customers, and reducing time-to-decision from 48 hours to under 5 minutes. The solution needed to process 15,000+ applications daily with 99.9% uptime.`,
                technicalArchitecture: `The architecture follows a microservices pattern deployed on Kubernetes. Data ingestion layer uses Apache Kafka for real-time application streaming. Feature engineering pipeline implements WOE binning with automatic optimal binning algorithms. The model layer combines logistic regression (for regulatory compliance) with gradient boosting (for accuracy) in a stacked ensemble.

Model serving uses TensorFlow Serving with custom WOE transformation layers. Explanation generation leverages SHAP values computed in real-time. The API layer exposes REST endpoints with sub-200ms latency. All components are containerized with Helm charts for reproducible deployments across dev, staging, and production environments.`,
                dataStrategy: `Data sources include credit bureau reports (Equifax, Experian), internal transaction history, alternative data (utility payments, rental history), and macroeconomic indicators. The feature store contains 847 engineered features across demographic, behavioral, and credit history dimensions.

WOE binning transforms continuous variables into risk-ranked categories, handling outliers naturally and creating monotonic relationships with default probability. IV analysis selects the most predictive features while eliminating redundant variables. Special handling for thin-file customers uses alternative data proxies and transfer learning from similar customer segments.`,
                modelPerformance: `The final model achieves a Gini coefficient of 0.78 (vs. 0.62 legacy), representing a 26% improvement in discrimination power. KS statistic of 0.52 indicates excellent separation between good and bad borrowers. At the optimal cutoff, the model captures 82% of defaults while approving 71% of good customers.

SHAP analysis reveals the top predictive features: credit utilization ratio (18% importance), payment history recency (15%), debt-to-income ratio (12%), and employment stability (9%). Model calibration is excellent with Brier score of 0.082. Stress testing shows robust performance across economic cycles with Gini remaining above 0.70 during recession simulations.`,
                implementationStrategy: `Deployment followed a phased rollout over 6 months. Phase 1 (months 1-2) involved shadow mode testing where model predictions were logged but not used for decisions. Phase 2 (months 3-4) implemented champion-challenger testing with 10% traffic diverted to the new model. Phase 3 (months 5-6) completed full migration with legacy system decommissioning.

Change management included training 340 loan officers on interpreting SHAP explanations and updating 27 policy documents. Monitoring dashboards track model drift, data quality, and business KPIs. Automated retraining triggers when PSI exceeds 0.25 or when AUC drops by more than 0.03 from baseline.`,
                businessImpact: `The new scoring engine reduced default rates by 31% in the first year, translating to $47 million in avoided losses. Approval automation increased from 34% to 68% of applications, reducing operational costs by $2.3 million annually. Customer satisfaction improved with average decision time dropping from 48 hours to 4.2 minutes.

The bank expanded its addressable market by 18% through improved thin-file assessment, generating an estimated $89 million in additional loan volume. Regulatory examinations praised the explainability framework, resulting in zero findings related to model risk management.`,
                lessonsLearned: `The importance of early stakeholder engagement became evident when loan officers initially resisted the new system. Involving them in SHAP explanation design during development built trust and accelerated adoption. Alternative data sources provided significant lift for thin-file customers but required extensive data quality validation.

The WOE binning approach, while powerful, needed careful monitoring as economic conditions shift. We implemented automatic bin boundary adjustment triggers to maintain model stability. Documentation rigor proved essential—regulators scrutinized every design decision, making comprehensive model cards invaluable.`
            },
            2: {
                subtitle: 'Survival Analysis',
                title: 'Customer Churn Forecaster',
                executiveSummary: `A telecommunications provider serving 8 million subscribers faced escalating churn rates in an increasingly competitive market. This project delivered a comprehensive customer retention system that predicts not just whether a customer will leave, but precisely when—enabling proactive intervention at the optimal moment.

The solution combines survival analysis techniques with gradient boosting to model customer lifetime dynamics. Unlike binary classification approaches, survival analysis handles censored data naturally and provides time-varying risk estimates. The system integrates with marketing automation to trigger personalized retention offers based on individual churn probability trajectories.`,
                businessProblem: `Churn had reached 3.2% monthly, costing the company $127 million annually in lost revenue and acquisition costs to replace departing customers. The existing rule-based retention system flagged customers only after they initiated port-out requests—far too late for effective intervention.

The challenge was predicting churn early enough for retention campaigns to be effective while avoiding offer fatigue from excessive outreach. Different customer segments exhibited vastly different churn patterns: postpaid contract customers showed gradual risk accumulation while prepaid users often churned abruptly. A one-size-fignal approach would not suffice.`,
                technicalArchitecture: `The system architecture combines batch and real-time components. Daily batch jobs train survival models on historical data using the Lifelines library for Cox Proportional Hazards and custom implementations for gradient-boosted survival trees. Real-time scoring uses a feature store updated from streaming event data.

The prediction service exposes both probability-at-time and expected-lifetime endpoints. Marketing integration uses a decision engine that evaluates churn probability against offer economics to determine optimal intervention timing and channel. A/B testing framework continuously evaluates retention offer effectiveness.`,
                dataStrategy: `Features span 847 variables across usage patterns (call duration, data consumption, roaming behavior), billing history (late payments, plan changes, overage charges), customer service interactions (complaint frequency, resolution time), and network experience (dropped calls, data speed tests).

SMOTE addresses class imbalance in the training data, creating synthetic churners to balance the dataset. Time-aware feature engineering captures trends like declining usage intensity and increasing support contacts. Seasonal patterns are encoded through Fourier features capturing monthly and quarterly cycles.`,
                modelPerformance: `The Cox Proportional Hazards model achieves a concordance index of 0.78, indicating strong predictive discrimination. Time-dependent AUC ranges from 0.82 at 30 days to 0.74 at 180 days, showing excellent near-term accuracy with graceful degradation. The gradient-boosted variant improves 90-day predictions to AUC 0.85.

        // Starfield Animation
        function initStarfield(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let width, height;
            let stars = [];
            const numStars = 200;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            function createStars() {
                stars = [];
                for (let i = 0; i < numStars; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 1.5 + 0.5,
                        speed: Math.random() * 0.3 + 0.1,
                        opacity: Math.random() * 0.5 + 0.3
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(46, 233, 246, ${star.opacity})`;
                    ctx.fill();

                    star.y += star.speed;
                    if (star.y > height) {
                        star.y = 0;
                        star.x = Math.random() * width;
                    }
                });

                requestAnimationFrame(animate);
            }

            resize();
            createStars();
            animate();

            window.addEventListener('resize', () => {
                resize();
                createStars();
            });
        }

        // Network Graph Rendering
        function renderNetworkGraph(container, graphData) {
            if (!container) return;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 100 100');
            svg.style.overflow = 'visible';

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            gradient.setAttribute('id', 'edgeGradient');
            gradient.innerHTML = `
                <stop offset="0%" style="stop-color:#2EE9F6;stop-opacity:0.8" />
                <stop offset="100%" style="stop-color:#2EE9F6;stop-opacity:0.2" />
            `;
            defs.appendChild(gradient);
            svg.appendChild(defs);

            // Render edges
            graphData.edges.forEach(edge => {
                const fromNode = graphData.nodes.find(n => n.id === edge.from);
                const toNode = graphData.nodes.find(n => n.id === edge.to);
                if (!fromNode || !toNode) return;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', fromNode.x);
                line.setAttribute('y1', fromNode.y);
                line.setAttribute('x2', toNode.x);
                line.setAttribute('y2', toNode.y);
                line.setAttribute('stroke', 'url(#edgeGradient)');
                line.setAttribute('stroke-width', '0.3');
                svg.appendChild(line);

                // Edge label
                const midX = (fromNode.x + toNode.x) / 2;
                const midY = (fromNode.y + toNode.y) / 2;
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', midX);
                text.setAttribute('y', midY);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#A9B3C8');
                text.setAttribute('font-size', '2.5');
                text.setAttribute('font-family', 'IBM Plex Mono');
                text.textContent = edge.label;
                svg.appendChild(text);
            });

            // Render nodes
            graphData.nodes.forEach(node => {
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', node.x);
                circle.setAttribute('cy', node.y);
                circle.setAttribute('r', node.group === 'central' ? 6 : 4);
                circle.setAttribute('fill', node.group === 'central' ? '#2EE9F6' : 'rgba(15, 23, 42, 0.9)');
                circle.setAttribute('stroke', '#2EE9F6');
                circle.setAttribute('stroke-width', '0.5');
                group.appendChild(circle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('fill', node.group === 'central' ? '#070B14' : '#F4F7FF');
                text.setAttribute('font-size', node.group === 'central' ? '2.8' : '2.2');
                text.setAttribute('font-family', 'IBM Plex Mono');
                text.setAttribute('font-weight', '500');
                text.style.whiteSpace = 'pre';
                text.textContent = node.label;
                group.appendChild(text);

                svg.appendChild(group);
            });

            container.appendChild(svg);
        }

        // Intersection Observer for animations
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });

            document.querySelectorAll('.fade-in, .slide-in-left').forEach(el => {
                observer.observe(el);
            });
        }

        // Update active nav dot on scroll
        function initNavTracking() {
            const projectSections = document.querySelectorAll('.project');
            const navDots = document.querySelectorAll('.nav-dot');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = Array.from(projectSections).indexOf(entry.target);
                        navDots.forEach((dot, i) => {
                            dot.classList.toggle('active', i === index);
                        });
                    }
                });
            }, { threshold: 0.5 });

            projectSections.forEach(section => observer.observe(section));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initStarfield('starfield');
            renderProjects();
            initScrollAnimations();
            initNavTracking();
        });
